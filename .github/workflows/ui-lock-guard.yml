name: UI Lock Guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Legacy Guard
        run: npm run guard:legacy

      - name: Lint Strict
        run: npm run lint:strict

      - name: Dead UI Audit
        run: npm run audit:ui

      - name: Build
        run: npm run build
